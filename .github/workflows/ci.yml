name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python tooling
        run: python -m pip install -r requirements-dev.txt
      - name: Run unit tests
        run: python -m unittest discover -s tests
      - name: Validate example order plan
        run: python scripts/check-risk-policy.py --json harness/examples/order-plan.example.json
      - name: Validate JSON schemas
        run: |
          python -m json.tool harness/order-plan.schema.json >/dev/null
          python -m json.tool harness/run-manifest.schema.json >/dev/null
          python -m json.tool .vscode/mcp.json >/dev/null
      - name: Ruff
        run: ruff check scripts tests
      - name: Leakage checker smoke test
        run: python scripts/check-leakage.py --help >/dev/null
      - name: Shellcheck
        run: |
          if command -v shellcheck >/dev/null 2>&1; then
            shellcheck scripts/*.sh
          else
            echo "shellcheck not installed; skipping"
          fi
