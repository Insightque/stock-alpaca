  min_cash_ratio: 0.20
  max_ticker_ratio: 0.20
exposure_limits:
  max_theme_ratio: 0.35
  max_factor_ratio: 0.50
  max_speculative_ratio: 0.12
  require_exposure_metadata: true
order_limits:
  max_orders_per_run: 10
  max_quote_age_minutes_submit: 20.0
  quote_age_tolerance_minutes: 0.5
  limit_guardrail_ratio: 0.005
  allowed_asset_types:
