version: medium-risk-v1.1
portfolio_limits:
  max_invested_ratio: 0.80
  min_cash_ratio: 0.20
  max_ticker_ratio: 0.15
exposure_limits:
  max_theme_ratio: 0.35
  max_factor_ratio: 0.50
  max_speculative_ratio: 0.12
  require_exposure_metadata: true
  metadata_path: harness/symbol-metadata.yaml
liquidity_limits:
  min_price: 5.00
  min_avg_daily_dollar_volume: 50000000
  max_spread_pct: 0.50
  reject_if_spread_missing: true
  allowed_liquidity_buckets:
    - mega
    - large
    - medium
order_limits:
  max_orders_per_run: 20
  max_quote_age_minutes_submit: 20.0
  quote_age_tolerance_minutes: 0.5
  limit_guardrail_ratio: 0.005
  allowed_asset_types:
    - stock
    - etf
  allowed_sides:
    - buy
    - sell
  required_order_type: limit
  required_time_in_force: day
  whole_share_orders: true
  long_only: true
  disallow_buy_reliance_on_same_run_sell_proceeds: true
daily_limits:
  max_new_orders_per_day: 20
  max_policy_turnover_ratio: 0.20
  max_weekly_turnover_ratio: 0.40
  max_daily_realized_loss_ratio: 0.02
  max_stop_triggered_orders_per_day: 3
correlated_cluster_limits:
  max_cluster_ratio: 0.45
  clusters:
    ai_semiconductor_complex:
      max_ratio: 0.45
    quantum_speculative:
      max_ratio: 0.12
    speculative_growth:
      max_ratio: 0.20
order_lifecycle:
  max_open_order_age_minutes: 30
  cancel_stale_unfilled_orders: true
  reject_duplicate_symbol_side_same_day: true
  require_post_trade_reconciliation: true
  partial_fill_policy:
    allow: true
    require_recompute_risk_after_fill: true
  retry_policy:
    max_submit_retries: 1
    retry_only_if_idempotent_client_order_id: true
validation:
  reject_non_finite_numbers: true
  schema_path: harness/order-plan.schema.json
