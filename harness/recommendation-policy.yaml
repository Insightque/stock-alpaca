promotion_criteria:
  long_term:
    min_completed_recommendations: 250
    min_independent_validation_windows: 3
    min_avg_spy_excess_20d_after_cost_pct: 3.0
    min_bootstrap_ci_lower_bound_pct: 0.0
    max_avg_adverse_move_20d_pct: -8.0
    max_single_symbol_contribution_pct: 25
    max_single_theme_exposure_pct: 35
    source_confidence_required: true
    liquidity_filter_required: true
    risk_gate_required: true
  intraday:
    required_status_before_auto: quote_level_validated
    min_trades_after_cost: 300
    min_independent_validation_windows: 4
    require_spread_pct: true
    require_limit_fill_probability: true
    require_minute_level_stop_take_ordering: true
    max_stop_rate_pct: 25
    min_profit_factor_after_cost: 1.25
    auto_orders_allowed: false_until_all_pass
  hourly_buy_sell:
    required_status_before_auto: quote_level_validated
    min_completed_20d_per_action: 900
    min_virtual_buy_20d_excess_after_cost_pct: 3.0
    min_virtual_buy_20d_ci_lower_bound_pct: 0.0
    min_event_feature_incremental_lift_vs_price_only_pct: 0.5
    require_virtual_sell_directional_excess_positive: true
    require_action_horizon_split: true
    require_baseline_ablation: true
    require_quote_level_validation: true
    auto_orders_allowed: false_until_merged_into_long_term_policy_and_all_pass
  simulation_policy_review:
    require_policy_decision: true
    require_baseline_comparison: true
    require_action_horizon_split: true
    require_incremental_lift_after_cost: true
    require_confidence_interval: true
    require_failure_lesson_logged: true
    require_policy_book_update_even_when_rejected: true
    decision_labels:
      - adopt
      - adopt_as_secondary_filter
      - observation_only
      - reject
      - needs_out_of_sample
