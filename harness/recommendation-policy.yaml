cadence_policy:
  scheduled_interval_minutes: 20
  market_hours_only: true
  alpaca_clock_preflight_required: true
  launchd_minutes:
    - 11
    - 31
    - 51
  launchd_hour_window_kst:
    - 22
    - 23
    - 0
    - 1
    - 2
    - 3
    - 4
    - 5
  overlap_behavior: lock_skip
  off_market_behavior: exit_before_research_preflight_or_codex
  market_open_validation_run_kst: "22:31"
  notes: keep_hourly_autopilot_name_for_compatibility_but_run_every_20_minutes_only_when_alpaca_clock_is_open
promotion_criteria:
  long_term:
    min_completed_recommendations: 250
    min_independent_validation_windows: 3
    min_avg_spy_excess_20d_after_cost_pct: 3.0
    min_bootstrap_ci_lower_bound_pct: 0.0
    max_avg_adverse_move_20d_pct: -8.0
    max_single_symbol_contribution_pct: 25
    max_single_theme_exposure_pct: 35
    source_confidence_required: true
    liquidity_filter_required: true
    risk_gate_required: true
  intraday:
    required_status_before_auto: quote_level_validated
    min_trades_after_cost: 300
    min_independent_validation_windows: 4
    require_spread_pct: true
    require_limit_fill_probability: true
    require_minute_level_stop_take_ordering: true
    max_stop_rate_pct: 25
    min_profit_factor_after_cost: 1.25
    auto_orders_allowed: false_until_all_pass
  hourly_buy_sell:
    required_status_before_auto: quote_level_validated
    min_completed_20d_per_action: 900
    min_virtual_buy_20d_excess_after_cost_pct: 3.0
    min_virtual_buy_20d_ci_lower_bound_pct: 0.0
    min_event_feature_incremental_lift_vs_price_only_pct: 0.5
    require_virtual_sell_directional_excess_positive: true
    require_action_horizon_split: true
    require_baseline_ablation: true
    require_quote_level_validation: true
    auto_orders_allowed: false_until_merged_into_long_term_policy_and_all_pass
  simulation_policy_review:
    require_policy_decision: true
    require_baseline_comparison: true
    require_action_horizon_split: true
    require_incremental_lift_after_cost: true
    require_confidence_interval: true
    require_failure_lesson_logged: true
    require_policy_book_update_even_when_rejected: true
    decision_labels:
      - adopt
      - adopt_as_secondary_filter
      - observation_only
      - reject
      - needs_out_of_sample
source_confidence:
  minimum_for_new_buy: 0.50
  provider_gap_blocks_order: false
  timestamp_basis: market_relevant_timestamp
  required_fields:
    - sec_filing_confirmed
    - earnings_confirmed
    - news_count
    - source_diversity
    - provider_gap
    - event_timestamp_known
    - confidence_score
mcp_gate_policy:
  core_servers:
    - alpaca
  research_servers:
    - sec-edgar
    - alpha-vantage
    - fred
    - firecrawl
    - yahoo-finance
  all_research_must_be_attempted: true
  min_research_confirmations_for_actionable: 3
  min_research_confirmations_for_submit: 3
  core_gate_blocks_order: true
  provider_gap_blocks_order: false_when_core_and_min_research_pass
  provider_gap_creates_recheck_candidate: true
  recheck_label: actionable_if_provider_recovered
  critical_source_rules:
    earnings_signal:
      require_any:
        - sec-edgar
        - alpha-vantage
        - firecrawl_company_ir
      missing_behavior: downgrade_to_watch
    macro_rate_sensitive_signal:
      require_any:
        - fred
        - explicit_macro_source
      missing_behavior: downgrade_to_watch
    filing_risk_signal:
      require_any:
        - sec-edgar_acceptance_time
      missing_behavior: block_new_buy
    analyst_only_signal:
      allowed_use: thesis_confirmation_only
      missing_behavior: no_positive_score_delta
risk_trim_policy:
  allow_core_only_risk_trim: true
  requires_alpaca_position_quote_order_state: true
  research_mcp_full_pass_required: false
  evaluation_order: before_new_buys
  decouple_from_buy_entry_window: true
  decouple_from_buy_budget: true
  allowed_reasons:
    - thesis_break
    - risk_limit
    - stale_thesis
    - position_sizing
    - portfolio_fit
    - relative_opportunity_cost
    - validation_lifecycle_review
    - target_band_de_risking
    - speculative_cap_exceeded
    - correlated_cluster_cap_exceeded
    - theme_factor_cap_exceeded
    - overheat_profit_protection
    - underperformance_control
    - duplicate_cluster_de_risking
  trim_requires:
    - fresh_quote
    - spread_within_policy
    - open_order_check
    - risk_check
    - whole_share_day_limit_order
  active_trim_triggers:
    default_trim_fraction_pct: 25
    minimum_trim_qty: 1
    keep_minimum_remaining_qty: 1
    position_weight_over_target_pct: 20
    theme_or_factor_usage_warning_ratio: 0.90
    correlated_cluster_usage_warning_ratio: 0.90
    overheat_profit_pct: 12
    overheat_reversal_5d_pct: -3
    stale_thesis_age_days: 5
    stale_thesis_underperform_spy_20d_pct: -5
    speculative_loss_pct: -8
    validation_review_underperform_spy_pct: -2
    require_no_same_day_buy_for_trim: true
  sell_candidate_diagnostics:
    enabled: true
    top_n: 3
    include_no_trigger_candidates: true
    include_blocked_by_gate_candidates: true
    metric_policy:
      require_metric_or_gap_reason: true
      allow_zero_only_when_status_is_zero_valid: true
      gap_reason_field: metric_gap_reason
      expected_excess_fallback_order:
        - strategy_expected_excess
        - ret20_spy_qqq_excess
        - latest_validation_review_excess
        - explicit_metric_gap_reason
      decision_grade_required_for_trim: true
      blocked_sell_recheck_label: blocked_sell_candidate
    rank_by:
      - active_trigger
      - target_band_warning
      - negative_expected_excess_return
      - replacement_quality_margin
      - stale_or_due_review
      - drawdown_or_reversal
    required_fields:
      - symbol
      - held_qty
      - current_weight_pct
      - trigger_status
      - primary_reason
      - skipped_gate
      - metric_status
      - expected_excess_return_20d_pct
      - relative_to_spy_20d_pct
      - metric_gap_reason
      - replacement_symbol
      - replacement_expected_excess_margin_pct
      - recommendation
      - blocked_sell_recheck
      - source_refs
  validation_lifecycle:
    enabled: true
    applies_to:
      - filled_validation_buy
      - still_held_validation_position
    review_horizons:
      - 1D
      - 5D
      - 20D
    required_decisions:
      - hold
      - add
      - trim
      - close
    block_add_when_review_due: true
    open_position_conclusions_are_interim: true
    record_missing_review_as_sell_candidate_diagnostic: true
    review_due_index_path: wiki/trade-ledger/reviews/review-due-index.json
    underperform_spy_pct_to_block_add: -2
    underperform_spy_pct_to_trim_watch: -2
  rotation_trim:
    enabled: true
    reason: relative_opportunity_cost
    default_trim_fraction_pct: 25
    held_expected_excess_return_floor_pct: 0
    replacement_min_confidence_score: 0.60
    replacement_expected_excess_margin_pct: 3
    require_replacement_passes_buy_gates: true
    require_held_position_passes_sell_gates: true
    require_distinct_or_lower_correlation_replacement: true
    do_not_rotate_same_day_validation_buy: true
    watch_label: rotation_trim_watch
  portfolio_target_bands:
    themes:
      ai_semiconductor:
        target_ratio: 0.25
        warning_ratio: 0.30
        hard_cap_source: risk_policy.exposure_limits.max_theme_ratio
        above_warning_behavior:
          block_new_buy_same_theme_unless_high_conviction: true
          deterioration_can_create_trim_candidate: true
    factors:
      ai_semiconductor:
        target_ratio: 0.40
        warning_ratio: 0.45
        hard_cap_source: risk_policy.exposure_limits.max_factor_ratio
        above_warning_behavior:
          block_new_buy_same_factor_unless_high_conviction: true
          deterioration_can_create_trim_candidate: true
    correlated_clusters:
      ai_semiconductor_complex:
        target_ratio: 0.35
        warning_ratio: 0.40
        hard_cap_source: risk_policy.correlated_cluster_limits.clusters.ai_semiconductor_complex.max_ratio
        above_warning_behavior:
          block_new_buy_same_cluster_unless_high_conviction: true
          deterioration_can_create_trim_candidate: true
paper_validation_execution:
  purpose: strategy_learning_and_capital_allocation
  enabled_for_hourly_autopilot: true
  enabled_for_market_open_pulse: false
  prefer_small_validation_order_when_gates_pass: false
  do_not_force_trade_when_any_hard_gate_fails: true
  hard_gates:
    - alpaca_paper_mode
    - market_open
    - alpaca_core_account_clock_position_order_quote_spread
    - universe_strict
    - mcp_tiered_strict
    - risk_policy
    - fresh_quote
    - spread_within_policy
    - whole_share_day_limit_order
  opening_window:
    enabled: true
    local_time_zone: Asia/Seoul
    start_time: "22:31"
    end_time: "23:31"
    objective: use_the_fixed_20_minute_cadence_with_22_31_kst_as_market_open_validation_run
  validation_order_sizing:
    allocation_mode: staged_confidence_notional
    default_qty: 1
    max_new_buy_orders_per_run: 5
    max_validation_notional_pct_per_order: 0.02
    max_validation_notional_pct_per_day: 0.10
    prefer_existing_highest_ranked_actionable_candidate: true
    allow_existing_position_add_only_if_position_cap_passes: true
    allow_multiple_candidates_per_run: true
    prefer_different_clusters_for_additional_orders: true
    max_same_cluster_new_buys_per_run: 1
    cash_ratio_floor_for_second_order: 0.25
    cash_ratio_floor_for_third_order: 0.25
    cash_ratio_floor_for_additional_orders: 0.25
    target_exposure_path:
      current_to_accelerate_until_ratio: 0.70
      selective_allocation_until_ratio: 0.75
      max_policy_target_ratio: 0.80
      max_new_exposure_pct_per_run_normal: 0.03
      max_new_exposure_pct_per_run_high_conviction: 0.05
      prefer_rebalance_over_new_buy_above_ratio: 0.75
      prefer_rebalance_over_new_buy_behavior: evaluate_trim_rotation_before_new_buy
    review_backlog_throttle:
      enabled: true
      pending_1d_count_field: review_backlog_pending_1d_count
      pending_5d_count_field: review_backlog_pending_5d_count
      pending_20d_count_field: review_backlog_pending_20d_count
      reduce_new_buy_slots_at_pending_1d: 8
      max_new_buy_slots_when_reduced: 1
      stop_new_buys_at_pending_1d: 12
      exclude_sides:
        - sell
      required_for_submit_buys: true
    open_order_policy:
      block_same_symbol_side_new_buy: true
      block_same_correlated_cluster_new_buy_when_open_order_exists: true
      allow_different_cluster_new_buy_when_open_orders_are_fresh: true
      require_lifecycle_gate_pass: true
    confidence_tiers:
      - name: validation_floor
        min_confidence_score: 0.50
        max_notional_pct: 0.005
        max_qty: 1
      - name: standard
        min_confidence_score: 0.60
        max_notional_pct: 0.01
        max_qty: 4
      - name: high_conviction
        min_confidence_score: 0.72
        max_notional_pct: 0.02
        max_qty: 6
  candidate_floor:
    minimum_confidence_score: 0.50
    allow_medium_source_confidence: true
    require_positive_expected_excess_return: true
    require_no_thesis_break: true
  no_action_diagnostics:
    record_first_blocking_gate: true
    record_next_relaxation_candidate: true
    record_top_recheck_candidates: 5
    record_top_sell_candidates: true
    record_validation_lifecycle_due: true
